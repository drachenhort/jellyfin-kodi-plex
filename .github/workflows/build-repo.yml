name: Build Kodi repository

on:
  push:
    branches: [master]
    paths:
      - "script.jellyfin.plex/addon.xml"
      - "addon.xml"
      - "repository.jellyfinplex/addon.xml"
      - "tools/build_repo.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build repository
        run: python tools/build_repo.py

      - name: Commit and push docs/ changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to docs/, skipping commit."
          else
            git commit -m "Rebuild Kodi repository [skip ci]"
            git push
          fi

      - name: Create GitHub release for this version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('addon.xml').getroot().attrib['version'])")
          tag="v${version}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
          else
            gh release create "$tag" --repo "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes \
              "docs/script.jellyfin.plex/script.jellyfin.plex-${version}.zip"
          fi
